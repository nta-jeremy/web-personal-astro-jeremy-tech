<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Jeremy Nguyen · Website Design Canvas</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
<style>
  body { font-family: 'Inter', sans-serif; }
  @keyframes wave { 0%,100%{transform: rotate(0deg);} 25%{transform: rotate(18deg);} 75%{transform: rotate(-10deg);} }
  /* Tweaks panel */
  .tweaks {
    position: fixed; bottom: 16px; right: 16px; z-index: 200;
    background: #fff; border: 1px solid #e3dfd2; border-radius: 12px;
    padding: 12px 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    font-family: 'Inter', sans-serif; font-size: 12px;
    display: none; flex-direction: column; gap: 10px; min-width: 200px;
  }
  .tweaks.open { display: flex; }
  .tweaks h4 { margin: 0 0 4px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #6b6860; font-weight: 600; }
  .tw-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .tw-toggle {
    position: relative; width: 36px; height: 20px; background: #e3dfd2; border-radius: 10px; cursor: pointer; transition: background .18s;
  }
  .tw-toggle.on { background: #b85c3c; }
  .tw-knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: left .18s; }
  .tw-toggle.on .tw-knob { left: 18px; }
</style>
</head>
<body>
<div id="root"></div>

<div class="tweaks" id="tweaks">
  <h4>Tweaks</h4>
  <div class="tw-row">
    <span>Dark mode</span>
    <div class="tw-toggle" id="dark-toggle"><div class="tw-knob"></div></div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="desktop.jsx"></script>
<script type="text/babel" src="mobile.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "dark": false
}/*EDITMODE-END*/;

function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  // Also apply to design-canvas bg itself? No — keep canvas neutral, only frames flip.
}
applyTheme(TWEAKS.dark);

// Wire up the Tweaks panel
(function wireTweaks() {
  let state = { dark: TWEAKS.dark };
  const panel = document.getElementById('tweaks');
  const toggle = document.getElementById('dark-toggle');

  function render() {
    toggle.classList.toggle('on', state.dark);
    applyTheme(state.dark);
  }
  render();

  toggle.addEventListener('click', () => {
    state.dark = !state.dark;
    render();
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: {dark: state.dark}}, '*');
  });

  window.addEventListener('message', (e) => {
    if (!e.data) return;
    if (e.data.type === '__activate_edit_mode') panel.classList.add('open');
    if (e.data.type === '__deactivate_edit_mode') panel.classList.remove('open');
  });
  window.parent.postMessage({type: '__edit_mode_available'}, '*');
})();

function App() {
  return (
    <DesignCanvas>
      <DCSection id="desktop-home" title="Home — desktop" subtitle="Two directions: chip-grid and editorial">
        <DCArtboard id="home-a" label="A · Chips grid" width={1000} height={720}><HomeA /></DCArtboard>
        <DCArtboard id="home-b" label="B · Editorial" width={1000} height={720}><HomeB /></DCArtboard>
      </DCSection>

      <DCSection id="desktop-pages" title="Desktop — inner pages" subtitle="One direction each: About · Projects · Blog list · Blog post · Contact">
        <DCArtboard id="about" label="About" width={1000} height={900}><AboutPage /></DCArtboard>
        <DCArtboard id="projects" label="Projects" width={1000} height={1100}><ProjectsPage /></DCArtboard>
        <DCArtboard id="blog" label="Blog · list" width={1000} height={1000}><BlogPage /></DCArtboard>
        <DCArtboard id="post" label="Blog · single post" width={1000} height={1200}><BlogPost /></DCArtboard>
        <DCArtboard id="contact" label="Contact" width={1000} height={820}><ContactPage /></DCArtboard>
      </DCSection>

      <DCSection id="mobile" title="Mobile — 375px" subtitle="Same hierarchy, bottom tab bar replaces sidebar">
        <DCArtboard id="m-home" label="Home" width={375} height={720}><MHome /></DCArtboard>
        <DCArtboard id="m-about" label="About" width={375} height={1000}><MAbout /></DCArtboard>
        <DCArtboard id="m-projects" label="Projects" width={375} height={1100}><MProjects /></DCArtboard>
        <DCArtboard id="m-blog" label="Blog · list" width={375} height={1000}><MBlog /></DCArtboard>
        <DCArtboard id="m-post" label="Blog · post" width={375} height={880}><MBlogPost /></DCArtboard>
        <DCArtboard id="m-contact" label="Contact" width={375} height={760}><MContact /></DCArtboard>
      </DCSection>

      <DCPostIt top={120} left={20} rotate={-3} width={180}>
        2 directions for Home (A: chips / B: editorial), then one direction for the rest, per your spec.
      </DCPostIt>
      <DCPostIt top={20} left={2160} rotate={2} width={190}>
        Click ⤢ on any artboard for focus mode · ←/→ to step, ↑/↓ across sections.
      </DCPostIt>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
